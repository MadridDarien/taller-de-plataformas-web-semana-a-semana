<!DOCTYPE html>
<html lang="es">
  
<head>
  <meta charset="UTF-8">
  <title>DM Travel Agency</title>
  <link rel="stylesheet" href="style.css">
  <!--creamos enlace con la dependencia style.css-->
</head>
  
<body>

  <h1>DM Travel Agency</h1>
  <p>Solicita tu viaje con nosotros</p>

  <div class="contenedor">
    <h2>Formulario de viaje</h2>

    <form id="formulario">

      <label>Nombre:</label>
      <input type="text" id="nombre">

      <label>Correo:</label>
      <input type="email" id="correo">

      <label>Destino:</label>
      <input type="text" id="destino" placeholder="Ej: Cancún, París">

      <label>Días de viaje:</label>
      <input type="text" id="dias">

      <label>Cantidad de pasajeros:</label>
      <input type="text" id="pasajeros">

      <label>Mensaje:</label>
      <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>

      <button type="submit">Enviar solicitud</button>

      <div id="estado" class="estado"></div>
        <!--agregamos un div para mostrar el estado del envio de forma dinamica-->
    </form>
  </div>
  
<script src="app.js"></script>
</body>
</html>
