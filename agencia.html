<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DM Travel Agency</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f4f4;
      text-align: center;
    }

    .contenedor {
      background: white;
      padding: 20px;
      width: 350px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    input, textarea {
      width: 90%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>

</head>
<body>

  <h1>DM Travel Agency</h1>
  <p>Solicita tu viaje con nosotros</p>

  <div class="contenedor">

    <h2>Formulario de viaje</h2>

    <form id="formulario">

      <label>Nombre:</label><br>
      <input type="text" id="nombre"><br><br>

      <label>Correo:</label><br>
      <input type="email" id="correo"><br><br>

      <label>Destino:</label><br>
      <input type="text" id="destino" placeholder="Ej: Cancún, París"><br><br>

      <label>Días de viaje:</label><br>
      <input type="number" id="dias"><br><br>

      <label>Cantidad de pasajeros:</label><br>
      <input type="number" id="pasajeros"><br><br>

      <label>Mensaje:</label><br>
      <textarea id="mensaje">Saludos desde Puerto Montt, Darien Madrid.</textarea><br><br>

      <button type="submit">Enviar solicitud</button>

    </form>

  </div>

  <script>

    document.getElementById("formulario").addEventListener("submit", function(e) {

      e.preventDefault();

      let nombre = document.getElementById("nombre").value;
      let correo = document.getElementById("correo").value;
      let destino = document.getElementById("destino").value;
      let dias = document.getElementById("dias").value;
      let pasajeros = document.getElementById("pasajeros").value;
      let mensaje = document.getElementById("mensaje").value;

      if (nombre === "" || correo === "" || destino === "" || dias === "" || pasajeros === "" || mensaje === "") {
        alert("Por favor, completa todos los campos");
        return;
      }

      let formatoCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!formatoCorreo.test(correo)) {
        alert("Correo inválido");
        return;
      }

      new Promise((resolve, reject) => {

        setTimeout(() => {

          let exito = Math.random() > 0.5;

          if (exito) {
            resolve("Solicitud de viaje enviada correctamente");
          } else {
            reject("Error al procesar la solicitud");
          }

        }, 2000);

      })
      .then((mensaje) => {
        alert(mensaje);
      })
      .catch((error) => {
        alert(error);
      });

    });

  </script>

</body>
</html>
